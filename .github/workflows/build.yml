name: Build iOS Tweak

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          brew install ldid make dpkg
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS

      - name: Install AltList headers + stub
        run: |
          export THEOS=$HOME/theos
          git clone https://github.com/opa334/AltList.git /tmp/AltList
          mkdir -p $THEOS/include/AltList
          cp /tmp/AltList/*.h $THEOS/include/AltList/
          mkdir -p $THEOS/lib/iphone/rootless/AltList.framework
          cp vendor/AltList.tbd $THEOS/lib/iphone/rootless/AltList.framework/AltList.tbd
          mkdir -p $THEOS/lib/AltList.framework
          cp vendor/AltList.tbd $THEOS/lib/AltList.framework/AltList.tbd
          rm -rf /tmp/AltList

      - name: Download Frida DevKit
        env:
          DEVKIT_URL: ${{ vars.DEVKIT_URL || 'https://github.com/rickbrian/frida_me/releases/download/17.9.11-ios-stealth/stealth-frida-gumjs-devkit-17.9.11-ios-arm64.tar.xz' }}
        run: |
          chmod +x scripts/download_devkit.sh
          ./scripts/download_devkit.sh

      - name: Build package
        run: |
          export THEOS=$HOME/theos
          export PATH="$THEOS/bin:$PATH"
          gmake package FINALPACKAGE=1

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: GumJSWebSocket-deb
          path: packages/*.deb

      - name: Build Sileo repo
        run: |
          chmod +x scripts/build_repo.sh
          ./scripts/build_repo.sh repo packages

      - name: Diagnose engine dylib
        run: |
          set -x
          mkdir -p /tmp/ext
          dpkg-deb -x packages/*.deb /tmp/ext || true
          DYLIB=$(find /tmp/ext -name 'libGJWSEngine.dylib' | head -1)
          echo "dylib path: $DYLIB"
          mkdir -p repo
          {
            echo "=== path ==="
            echo "$DYLIB"
            echo
            echo "=== file ==="
            file "$DYLIB"
            echo
            echo "=== otool -L (dependencies) ==="
            otool -L "$DYLIB"
            echo
            echo "=== otool -l (platform / min os) ==="
            otool -l "$DYLIB" | grep -A5 -iE 'LC_BUILD_VERSION|LC_VERSION_MIN|platform|minos|sdk'
            echo
            echo "=== otool -hv (header flags / namespace) ==="
            otool -hv "$DYLIB"
            echo
            echo "=== exported symbol count (nm -gU | wc -l) ==="
            nm -gU "$DYLIB" | wc -l
            echo
            echo "=== exported symbols (nm -gU) ==="
            nm -gU "$DYLIB"
          } > repo/engine_diag.txt 2>&1
          echo "----- engine_diag.txt -----"
          cat repo/engine_diag.txt

      - name: Deploy to gh-pages branch
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cd repo
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy Sileo repo"
          git push -f "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" gh-pages

  # 把编译好的 deb 自动推送到统一 Sileo 源 (rickbrian/repo)
  # 需要在本仓库配置 secret: REPO_TOKEN (对 rickbrian/repo 有写权限的 PAT)
  publish-to-repo:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download deb artifact
        uses: actions/download-artifact@v4
        with:
          name: GumJSWebSocket-deb
          path: incoming

      - name: Push deb to rickbrian/repo
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          if [ -z "$REPO_TOKEN" ]; then
            echo "::error::缺少 secret REPO_TOKEN, 无法推送到统一源"
            exit 1
          fi
          sudo apt-get update && sudo apt-get install -y dpkg-dev
          DEB=$(ls incoming/*.deb 2>/dev/null | head -1)
          if [ -z "$DEB" ]; then
            echo "::error::artifact 里没有 .deb"
            exit 1
          fi
          PKG=$(dpkg-deb -f "$DEB" Package)
          echo "包名: $PKG, 文件: $(basename "$DEB")"
          git clone "https://x-access-token:${REPO_TOKEN}@github.com/rickbrian/repo.git" repo
          mkdir -p repo/debs
          rm -f repo/debs/${PKG}_*.deb
          cp "$DEB" repo/debs/
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "没有变化, 跳过"
            exit 0
          fi
          git commit -m "Update ${PKG} deb ($(basename "$DEB"))"
          git push
