name: Build iOS Tweak

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          brew install ldid make
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS

      - name: Download Frida DevKit
        env:
          DEVKIT_URL: ${{ vars.DEVKIT_URL || 'https://github.com/rickbrian/frida_me/releases/download/17.9.11-ios-stealth/stealth-frida-gumjs-devkit-17.9.11-ios-arm64.tar.xz' }}
        run: |
          chmod +x scripts/download_devkit.sh
          ./scripts/download_devkit.sh

      - name: Build package
        run: |
          export THEOS=$HOME/theos
          export PATH="$THEOS/bin:$PATH"
          gmake package FINALPACKAGE=1

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: GumJSWebSocket-deb
          path: packages/*.deb
