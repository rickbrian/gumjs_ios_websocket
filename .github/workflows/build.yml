name: Build iOS Tweak

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          brew install ldid make dpkg
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS

      - name: Install AltList into Theos
        run: |
          export THEOS=$HOME/theos
          export PATH="$THEOS/bin:$PATH"
          git clone https://github.com/opa334/AltList.git /tmp/AltList
          cd /tmp/AltList
          chmod +x install_to_theos.sh
          ./install_to_theos.sh

      - name: Download Frida DevKit
        env:
          DEVKIT_URL: ${{ vars.DEVKIT_URL || 'https://github.com/rickbrian/frida_me/releases/download/17.9.11-ios-stealth/stealth-frida-gumjs-devkit-17.9.11-ios-arm64.tar.xz' }}
        run: |
          chmod +x scripts/download_devkit.sh
          ./scripts/download_devkit.sh

      - name: Build package
        run: |
          export THEOS=$HOME/theos
          export PATH="$THEOS/bin:$PATH"
          gmake package FINALPACKAGE=1

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: GumJSWebSocket-deb
          path: packages/*.deb

      - name: Build Sileo repo
        run: |
          chmod +x scripts/build_repo.sh
          ./scripts/build_repo.sh repo packages

      - name: Deploy to gh-pages branch
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cd repo
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy Sileo repo"
          git push -f "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" gh-pages
